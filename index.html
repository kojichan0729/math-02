<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>計算練習アプリ（初級）</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<script src="main.js"></script>
<div class="app">

  <!-- Setup -->
  <div id="setup-screen" class="screen active">
    <div class="app-title">計算練習アプリ（初級）</div>
    <div class="card">
      <div class="setup-label" style="margin-bottom:10px;">出題する問題を選ぶ（1つ以上）</div>
      <div class="check-list">
        <label class="check-row"><input type="checkbox" value="0" checked><span class="badge badge-a">A</span><span class="check-desc">三桁 × 二桁</span></label>
        <label class="check-row"><input type="checkbox" value="1" checked><span class="badge badge-b">B</span><span class="check-desc">三桁 − 三桁 ＋ 三桁</span></label>
        <label class="check-row"><input type="checkbox" value="2" checked><span class="badge badge-c">C</span><span class="check-desc">○.○○ ÷ ○.○（小数点以下2桁）</span></label>
        <label class="check-row"><input type="checkbox" value="3" checked><span class="badge badge-d">D</span><span class="check-desc">（二桁 − 二桁）÷ ○.○（小数点以下2桁）</span></label>
        <label class="check-row"><input type="checkbox" value="4" checked><span class="badge badge-e">E</span><span class="check-desc">1〜9 × 1〜9 × 3.14 ÷ 2〜6（小数点以下2桁）</span></label>
        <label class="check-row"><input type="checkbox" value="5" checked><span class="badge badge-f">F</span><span class="check-desc">二桁 × 二桁 × 二桁</span></label>
      </div>
      <div id="check-error" style="display:none;font-size:12px;color:#e24b4a;margin-bottom:10px;">最低1つ選んでください</div>
      <label class="setup-label" for="time-limit-input" style="margin-top:1rem;">1問あたりの制限時間</label>
      <div class="time-row">
        <input type="number" class="time-input" id="time-limit-input" value="30" min="5" max="600">
        <span class="time-unit">秒</span>
      </div>
      <button class="btn primary" onclick="startQuiz()">スタート</button>
    </div>

    <!-- 記録パネル -->
    <div class="card" id="setup-stats-card">
      <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:10px;">📊 記録</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;">
        <div class="stat-cell"><div class="stat-label">ベストタイム</div><div class="stat-val" id="s-best-time">-</div></div>
        <div class="stat-cell"><div class="stat-label">最高ランク</div><div class="stat-val" id="s-best-rank">-</div></div>
        <div class="stat-cell"><div class="stat-label">ランク平均</div><div class="stat-val" id="s-avg-rank">-</div></div>
        <div class="stat-cell"><div class="stat-label">挑戦回数</div><div class="stat-val" id="s-play-count">-</div></div>
        <div class="stat-cell" style="grid-column:span 2;"><div class="stat-label">Math Point</div><div class="stat-val"><span id="s-mp-total">0</span> MP</div></div>
      </div>
      <div class="mp-bar-bg" style="margin-bottom:6px;"><div class="mp-bar-fill" id="s-mp-bar" style="width:0%"></div></div>
      <button class="btn primary" id="s-slot-btn" style="display:none;" onclick="openSlot()">🎰 スロットを回す（50MP消費）</button>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz-screen" class="screen">
    <div class="meta-row">
      <span id="q-counter">問題 1 / 8</span>
      <span>残り <b id="timer-sec">30</b> 秒</span>
    </div>
    <div class="timer-bg"><div class="timer-bar" id="timer-bar"></div></div>
    <div class="card">
      <div class="q-type-wrap" id="q-type-badge"></div>
      <div class="question-display" id="question-text"></div>
      <div class="hint-text" id="hint-text"></div>
    </div>
    <div class="feedback" id="feedback-msg"></div>
    <input type="number" class="answer-input" id="answer-input" placeholder="答えを入力" step="any" autocomplete="off">
    <button class="btn primary" onclick="submitAnswer()">答える（Enter）</button>
  </div>

  <!-- Result -->
  <div id="result-screen" class="screen">
    <div class="card">
      <div class="result-summary">
        <div class="score-big" id="score-correct">0<span class="score-denom"> / 8</span></div>
        <div id="result-rank" style="font-size:42px;font-weight:500;letter-spacing:2px;margin:6px 0 2px;color:var(--text);"></div>
        <div class="score-msg" id="result-msg"></div>
        <div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
          <div class="stat-cell"><div class="stat-label">合計時間</div><div class="stat-val" id="total-time-display">-</div></div>
          <div class="stat-cell"><div class="stat-label">平均解答時間</div><div class="stat-val" id="avg-time-display">-</div></div>
          <div class="stat-cell"><div class="stat-label">ベストタイム</div><div class="stat-val" id="best-time-display">-</div></div>
          <div class="stat-cell"><div class="stat-label">最高ランク</div><div class="stat-val" id="best-rank-display">-</div></div>
          <div class="stat-cell"><div class="stat-label">ランク平均</div><div class="stat-val" id="avg-rank-display">-</div></div>
          <div class="stat-cell"><div class="stat-label">挑戦回数</div><div class="stat-val" id="play-count-display">-</div></div>
        </div>
      </div>
    </div>
    <div id="wrong-section" style="display:none;">
      <div class="wrong-section-title">間違えた問題</div>
      <div id="wrong-list"></div>
    </div>
    <div id="all-correct-section" style="display:none;" class="all-correct-msg">全問正解！素晴らしい！</div>
    <div class="card" style="margin-top:1rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <span style="font-size:13px;font-weight:500;color:var(--text);">Math Point</span>
        <span style="font-size:13px;color:var(--text-sub);"><b id="mp-total" style="color:var(--text);">0</b> MP</span>
      </div>
      <div class="mp-bar-bg"><div class="mp-bar-fill" id="mp-bar" style="width:0%"></div></div>
      <div class="mp-earn" id="mp-earn"></div>
      <button class="btn primary" id="slot-btn" style="margin-top:10px;display:none;" onclick="openSlot()">🎰 スロットを回す（50MP消費）</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:0.75rem;">
      <button class="btn primary" onclick="goSetup()">もう一度挑戦する</button>
      <button class="btn" style="color:#e24b4a;border-color:#e24b4a;white-space:nowrap;" onclick="confirmReset()">記録リセット</button>
    </div>
  </div>

  <!-- Slot Modal -->
  <div class="slot-modal" id="slot-modal" style="display:none;">
    <div class="slot-box">
      <div class="slot-title">🎰 スロット</div>
      <div class="slot-reels">
        <div class="slot-reel" id="reel0"><div class="slot-reel-inner" id="reel-inner0"></div></div>
        <div class="slot-reel" id="reel1"><div class="slot-reel-inner" id="reel-inner1"></div></div>
        <div class="slot-reel" id="reel2"><div class="slot-reel-inner" id="reel-inner2"></div></div>
      </div>
      <div class="bingo-bottle" id="bingo-bottle" style="display:none;">🍾</div>
      <div class="slot-result-msg" id="slot-result-msg"></div>
      <button class="btn primary" id="slot-spin-btn" onclick="spinSlot()">回す！</button>
      <button class="btn slot-close" onclick="closeSlot()" id="slot-close-btn" style="display:none;margin-top:8px;">閉じる</button>
    </div>
  </div>

</div>

<script>

</script>
</body>
</html>
